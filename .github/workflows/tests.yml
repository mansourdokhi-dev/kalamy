name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend (NestJS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/kalamy?schema=public
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm test
      - run: npm run build

  staff-web:
    name: Staff Web (Vite/React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: staff-web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: staff-web/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  mobile:
    name: Mobile (Expo/React Native)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - run: npm test -- --ci
